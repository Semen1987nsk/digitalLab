name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Один и тот же commit на одной ветке — отменяем предыдущий run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: analyze + test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Drift / Riverpod code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Static analysis
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --reporter expanded

  build-windows:
    name: build (windows)
    runs-on: windows-latest
    timeout-minutes: 30
    needs: flutter

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: digitalLab-windows-release
          path: build/windows/x64/runner/Release/
          retention-days: 7
