<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифровая Лаборатория</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --surface-light: #2d2d2d;
            --primary: #4CAF50;
            --text: #ffffff;
            --text-secondary: #b3b3b3;
            --distance: #00BCD4;
            --temperature: #F44336;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--surface);
            border-radius: 20px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .big-value {
            text-align: center;
            padding: 40px 20px;
            background: var(--surface);
            border-radius: 16px;
            margin-bottom: 24px;
        }
        
        .big-value .label {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .big-value .value {
            font-size: 72px;
            font-weight: bold;
            color: var(--distance);
            font-variant-numeric: tabular-nums;
        }
        
        .big-value .unit {
            font-size: 32px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        
        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .btn {
            flex: 1;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-secondary {
            background: var(--surface-light);
            color: var(--text);
        }
        
        .btn-danger {
            background: #F44336;
            color: white;
        }
        
        .chart-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
            height: 300px;
        }
        
        #chart {
            width: 100%;
            height: 100%;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .info-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
        }
        
        .info-card .label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        
        .info-card .value {
            font-size: 24px;
            font-weight: 600;
        }
        
        .info-card.temperature .value {
            color: var(--temperature);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 Цифровая Лаборатория</h1>
        <div class="status">
            <div class="status-dot"></div>
            <span id="status-text">Подключено</span>
        </div>
    </div>
    
    <div class="big-value">
        <div class="label">Расстояние</div>
        <div>
            <span class="value" id="distance-value">---</span>
            <span class="unit">мм</span>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn btn-primary" id="btn-start" onclick="startMeasurement()">
            ▶ Старт
        </button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopMeasurement()" style="display:none">
            ■ Стоп
        </button>
        <button class="btn btn-secondary" onclick="calibrate()">
            ⚙ Ноль
        </button>
    </div>
    
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>
    
    <div class="info-grid">
        <div class="info-card temperature">
            <div class="label">Температура</div>
            <div class="value" id="temp-value">--.- °C</div>
        </div>
        <div class="info-card">
            <div class="label">Измерений</div>
            <div class="value" id="count-value">0</div>
        </div>
        <div class="info-card">
            <div class="label">Частота</div>
            <div class="value" id="rate-value">10 Гц</div>
        </div>
        <div class="info-card">
            <div class="label">Версия</div>
            <div class="value" id="version-value">1.0.0</div>
        </div>
    </div>
    
    <script>
        // =====================================================================
        // Встроенный лёгкий движок графиков (Canvas2D)
        // Не требует CDN — работает полностью офлайн на ESP32
        // =====================================================================
        class MiniChart {
            constructor(canvasId, options = {}) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.data = [];
                this.maxPoints = options.maxPoints || 200;
                this.lineColor = options.lineColor || '#00BCD4';
                this.fillColor = options.fillColor || 'rgba(0, 188, 212, 0.1)';
                this.gridColor = options.gridColor || 'rgba(255,255,255,0.1)';
                this.textColor = options.textColor || '#b3b3b3';
                this.labelX = options.labelX || 'Время, с';
                this.labelY = options.labelY || 'Расстояние, мм';
                this.padding = { top: 20, right: 20, bottom: 40, left: 60 };
                this._resize();
                window.addEventListener('resize', () => this._resize());
            }
            
            _resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width;
                this.canvas.height = rect.height;
                this.draw();
            }
            
            addPoint(x, y) {
                this.data.push({ x, y });
                if (this.data.length > this.maxPoints) {
                    this.data.shift();
                }
                this.draw();
            }
            
            clear() {
                this.data = [];
                this.draw();
            }
            
            draw() {
                const { ctx, canvas, padding, data } = this;
                const w = canvas.width;
                const h = canvas.height;
                const plotW = w - padding.left - padding.right;
                const plotH = h - padding.top - padding.bottom;
                
                // Очистка
                ctx.clearRect(0, 0, w, h);
                
                if (data.length < 2) {
                    ctx.fillStyle = this.textColor;
                    ctx.font = '14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Нажмите "Старт" для начала', w / 2, h / 2);
                    return;
                }
                
                // Диапазоны данных
                let minX = data[0].x, maxX = data[data.length - 1].x;
                let minY = Infinity, maxY = -Infinity;
                for (const p of data) {
                    if (p.y < minY) minY = p.y;
                    if (p.y > maxY) maxY = p.y;
                }
                // Минимальный диапазон Y — 20 мм
                const rangeY = maxY - minY;
                if (rangeY < 20) {
                    const center = (maxY + minY) / 2;
                    minY = center - 10;
                    maxY = center + 10;
                }
                const padY = (maxY - minY) * 0.05;
                minY -= padY;
                maxY += padY;
                
                const scaleX = (v) => padding.left + ((v - minX) / (maxX - minX || 1)) * plotW;
                const scaleY = (v) => padding.top + plotH - ((v - minY) / (maxY - minY || 1)) * plotH;
                
                // Сетка (5 линий)
                ctx.strokeStyle = this.gridColor;
                ctx.lineWidth = 1;
                ctx.font = '10px sans-serif';
                ctx.fillStyle = this.textColor;
                ctx.textAlign = 'right';
                for (let i = 0; i <= 4; i++) {
                    const val = minY + (maxY - minY) * (i / 4);
                    const y = scaleY(val);
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(w - padding.right, y);
                    ctx.stroke();
                    ctx.fillText(val.toFixed(1), padding.left - 5, y + 3);
                }
                ctx.textAlign = 'center';
                for (let i = 0; i <= 4; i++) {
                    const val = minX + (maxX - minX) * (i / 4);
                    const x = scaleX(val);
                    ctx.beginPath();
                    ctx.moveTo(x, padding.top);
                    ctx.lineTo(x, h - padding.bottom);
                    ctx.stroke();
                    ctx.fillText(val.toFixed(1), x, h - padding.bottom + 15);
                }
                
                // Подписи осей
                ctx.fillStyle = this.textColor;
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(this.labelX, padding.left + plotW / 2, h - 5);
                ctx.save();
                ctx.translate(12, padding.top + plotH / 2);
                ctx.rotate(-Math.PI / 2);
                ctx.fillText(this.labelY, 0, 0);
                ctx.restore();
                
                // Заливка
                ctx.beginPath();
                ctx.moveTo(scaleX(data[0].x), scaleY(minY));
                for (const p of data) ctx.lineTo(scaleX(p.x), scaleY(p.y));
                ctx.lineTo(scaleX(data[data.length - 1].x), scaleY(minY));
                ctx.closePath();
                ctx.fillStyle = this.fillColor;
                ctx.fill();
                
                // Линия
                ctx.beginPath();
                ctx.moveTo(scaleX(data[0].x), scaleY(data[0].y));
                for (let i = 1; i < data.length; i++) {
                    ctx.lineTo(scaleX(data[i].x), scaleY(data[i].y));
                }
                ctx.strokeStyle = this.lineColor;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // Инициализация графика
        const chart = new MiniChart('chart', {
            maxPoints: 200,
            lineColor: '#00BCD4',
            labelX: 'Время, с',
            labelY: 'Расстояние, мм',
        });
        
        let measuring = false;
        let measurementCount = 0;
        let startTime = 0;
        
        // Получение данных с датчика
        async function fetchData() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                document.getElementById('distance-value').textContent = 
                    data.distance_mm.toFixed(1);
                document.getElementById('temp-value').textContent = 
                    data.temperature_c.toFixed(1) + ' °C';
                document.getElementById('count-value').textContent = 
                    data.buffer_count;
                
                if (measuring) {
                    const time = (Date.now() - startTime) / 1000;
                    chart.addPoint(time, data.distance_mm);
                    measurementCount++;
                }
            } catch (e) {
                document.getElementById('status-text').textContent = 'Ошибка связи';
            }
        }
        
        function startMeasurement() {
            measuring = true;
            startTime = Date.now();
            measurementCount = 0;
            chart.clear();
            
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'block';
            
            fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: 'start' })
            });
        }
        
        function stopMeasurement() {
            measuring = false;
            
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-stop').style.display = 'none';
            
            fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: 'stop' })
            });
        }
        
        function calibrate() {
            fetch('/api/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: 'calibrate', sensor: 'distance' })
            });
        }
        
        // Опрос каждые 100мс
        setInterval(fetchData, 100);
        fetchData();
    </script>
</body>
</html>
